<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="256" height="256" fill="#181720"/>

  <!-- Cyan border (pixel style) -->
  <rect x="8" y="8" width="240" height="240" fill="none" stroke="#00b4d8" stroke-width="3"/>
  <rect x="16" y="16" width="224" height="224" fill="none" stroke="#00b4d8" stroke-width="2"/>

  <!-- Orange corner accent pixels -->
  <rect x="20" y="20" width="16" height="16" fill="#ff6b35"/>
  <rect x="220" y="20" width="16" height="16" fill="#ff6b35"/>
  <rect x="20" y="220" width="16" height="16" fill="#ff6b35"/>
  <rect x="220" y="220" width="16" height="16" fill="#ff6b35"/>

  <!-- "MPNG" pixelated text -->
  <text x="128" y="150" font-family="monospace" font-size="72" font-weight="bold" fill="#00b4d8" text-anchor="middle" letter-spacing="2">MPNG</text>

  <!-- Subtle scanlines for retro effect -->
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="256" height="2">
      <line x1="0" y1="0" x2="256" y2="0" stroke="#00b4d8" stroke-width="1" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#scanlines)"/>
</svg>
