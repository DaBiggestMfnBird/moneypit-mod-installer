<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <title>MoneyPit Mod Installer</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-new.css">
</head>
<body>

  <!-- Main Layout: Sidebar + Canvas -->
  <div class="layout">

    <!-- SIDEBAR: Animal Selector -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">CREATURES</div>
        <div class="sidebar-subtitle">Select your companion</div>
      </div>

      <div class="animal-grid" id="animalGrid">
        <!-- Populated by renderer.js -->
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-controls">
        <label class="toggle-control">
          <input type="checkbox" id="flyingToggle" checked />
          <span class="toggle-label">Let them fly</span>
          <span class="toggle-indicator"></span>
        </label>
      </div>

      <div class="sidebar-footer">
        <div class="footer-text">MoneyPit v1.0.0</div>
      </div>
    </aside>

    <!-- MAIN CONTENT: Canvas + UI Overlay -->
    <main class="main-content">

      <!-- Game Canvas -->
      <canvas id="gameCanvas" width="1200" height="800"></canvas>

      <!-- UI Overlay (on top of canvas) -->
      <div class="ui-overlay">

        <!-- Header -->
        <header class="header">
          <div class="logo-pixel">M◆NEYPIT</div>
          <div class="hud-stat" id="hudStat">SYS READY</div>
        </header>

        <!-- Top Mods Section -->
        <section class="top-mods-section">
          <h2 class="section-title">⭐ HOT MODS</h2>
          <div class="mods-carousel" id="modsCarousel">
            <div class="carousel-loading">Loading top mods...</div>
          </div>
        </section>

        <!-- Install Section -->
        <section class="install-section">
          <div class="install-input-group">
            <input
              id="modUrl"
              type="text"
              class="install-input"
              placeholder="Paste mod URL or drag & drop..."
              spellcheck="false"
            />
            <button id="pasteBtn" class="install-paste-btn" title="Paste from clipboard">📋</button>
          </div>
          <button id="installBtn" class="install-btn">INSTALL MOD</button>
        </section>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">▼</div>
          <span class="drop-text">Drop .zip files here</span>
          <input type="file" id="fileInput" style="display: none;" accept=".zip" />
        </div>

        <!-- Progress Section (hidden) -->
        <div id="progressSection" class="progress-section" style="display: none;">
          <div class="progress-card">
            <div class="progress-header">
              <span id="progressStatus" class="progress-status">Downloading...</span>
              <span id="progressPercent" class="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressDetails" class="progress-details">Fetching mod files (0%)</div>
          </div>
        </div>

        <!-- Result Section (hidden) -->
        <div id="resultSection" class="result-section" style="display: none;">
          <div id="resultCard" class="result-card">
            <div class="result-icon">✓</div>
            <h3 id="resultTitle" class="result-title">Installation Complete!</h3>
            <p id="resultMessage" class="result-message">Your mod is ready to use in BeamNG.drive</p>
            <button id="resetBtn" class="result-btn">INSTALL ANOTHER</button>
          </div>
        </div>

      </div>

    </main>

  </div>

  <!-- Scripts -->
  <script src="src/game-engine-browser.js"></script>
  <script src="renderer.js"></script>

</body>
</html>
